<!-- Presentacion/templates/map.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi Mapa Personalizado + Rutas</title>

  <!-- IMPORTANTE: Carga la API de Google Maps con &callback=initMap y &libraries=geometry -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap&libraries=geometry"
    async
    defer>
  </script>

  <!-- Tu CSS (opcional) -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- Tu barra de navegación, overlay de carga, panel lateral, etc. -->
  <nav>
    <div class="nav-logo">Green Lake</div>
    <ul>
      <li><a onclick="mostrarHoteles()">Hoteles</a></li>
      <li><a onclick="mostrarRutas()">Rutas</a></li>
      <li><a onclick="mostrarSitios()">Sitios</a></li>
    </ul>
  </nav>

  <div id="loadingOverlay"><div class="spinner"></div></div>

  <div id="map"></div>

  <div id="sidebar">
    <button id="closeSidebar" onclick="toggleSidebar()">×</button>
    <h2>Panel de Información</h2>
    <div id="infoSection"></div>
  </div>

  <!-- Carga la API de Google Maps -->
  <!-- Sustituye TU_API_KEY y TU_MAP_ID por los tuyos -->
  <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&map_ids=TU_MAP_ID"></script>

  <!-- Carga JS principal -->
  <script src="/static/js/script.js"></script>
</body>
</html>
