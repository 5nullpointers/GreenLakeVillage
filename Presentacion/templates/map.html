<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Lake Village</title>

  <!-- Fuente Poppins (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Carga CSS desde /static/css/style.css -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

  <!-- Barra de navegación -->
  <nav>
    <div class="nav-logo">Green Lake</div>
    <ul>
      <li><a onclick="mostrarHoteles()">Hoteles</a></li>
      <li><a onclick="mostrarRutas()">Rutas</a></li>
      <li><a onclick="mostrarSitios()">Sitios</a></li>
    </ul>
  </nav>

  <!-- Overlay de carga con un spinner -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Mapa a pantalla completa -->
  <div id="map"></div>

  <!-- Panel lateral (deslizable) -->
  <div id="sidebar">
    <button id="closeSidebar" onclick="toggleSidebar()">×</button>
    <h2>Panel de Información</h2>
    <div id="infoSection"></div>
  </div>

  <!-- Carga la API de Google Maps -->
  <!-- Sustituye TU_API_KEY y TU_MAP_ID por los tuyos -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBwlZsP6orMJgEUaad0eNY3aJd-nVgvUz0&map_ids=TU_MAP_ID"></script>
  <!-- Carga JS -->
  <script src="/static/js/script.js"></script>
</body>

</html>
