<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Mapa Personalizado + Rutas</title>

  <!-- Carga la API de Google Maps con &callback=initMap -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap&libraries=geometry"
    async
    defer>
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav>
    <div class="nav-logo">Green Lake</div>
    <div class="user-profile">
      <img src="/static/Images/user-circle.png" alt="Imagen de perfil" class="profile-img" />
      <div class="user-dropdown" id="userDropdown">
        <ul>
          <li><a href="#">Configuración</a></li>
          <li><a href="/">Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
    <ul>
      <li><a onclick="mostrarHoteles()">Hoteles</a></li>
      <li><a onclick="mostrarRutas()">Rutas</a></li>
      <li><a onclick="mostrarSitios()">Sitios</a></li>
      <li><a onclick="mostrarForo()">Foro</a></li>
    </ul>
  </nav>

  <div id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Contenedor para el mapa -->
  <div id="map"></div>

  <!-- Panel lateral -->
  <div id="sidebar">
    <button id="closeSidebar" onclick="toggleSidebar()">×</button>
    <h2>Panel de Información</h2>
    <div id="infoSection"></div>
  </div>

  <!-- Asistente Virtual (opcional) -->
  <div id="assistant">
    <div class="assistant-header">
      <img src="/static/Images/robot.png" alt="Asistente Robot">
    </div>
    <div id="assistant-chat"></div>
    <div class="assistant-input-container">
      <input type="text" id="assistant-input" placeholder="Haz una pregunta...">
      <button id="assistant-send">Enviar</button>
    </div>
  </div>

  <!-- Script principal -->
  <script src="/static/js/script.js"></script>
</body>
</html>
