<!-- Presentacion/templates/map.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi Mapa Personalizado + Rutas</title>

  <!-- IMPORTANTE: Carga la API de Google Maps con &callback=initMap y &libraries=geometry -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap&libraries=geometry"
    async
    defer>
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>


  <!-- Tu CSS (opcional) -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- Tu barra de navegación, overlay de carga, panel lateral, etc. -->
  <nav>
    <div class="nav-logo">Green Lake</div>
    <div class="user-profile">
      <!-- Se ha eliminado el span del nombre -->
      <img src="/static/Images/user-circle.png" alt="Imagen de perfil" class="profile-img" />
      <div class="user-dropdown" id="userDropdown">
        <ul>
          <li><a href="#">Configuración</a></li>
          <li><a href="/">Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
    <ul>
      <li><a onclick="mostrarHoteles()">Hoteles</a></li>
      <li><a onclick="mostrarRutas()">Rutas</a></li>
      <li><a onclick="mostrarSitios()">Sitios</a></li>
    </ul>
  </nav>

  <div id="loadingOverlay"><div class="spinner"></div></div>

  <div id="map"></div>

  <div id="sidebar">
    <button id="closeSidebar" onclick="toggleSidebar()">×</button>
    <h2>Panel de Información</h2>
    <div id="infoSection"></div>
  </div>

<!-- Asistente Virtual -->
<div id="assistant">
  <div class="assistant-header">
    <img src="/static/Images/robot.png" alt="Asistente Robot">
  </div>
  <div id="assistant-chat">
    <!-- Aquí se mostrarán los mensajes -->
  </div>
  <div class="assistant-input-container">
    <input type="text" id="assistant-input" placeholder="Haz una pregunta...">
    <button id="assistant-send">Enviar</button>
  </div>
</div>


  <!-- Carga tu script principal con la lógica del mapa -->
  <script src="/static/js/script.js"></script>
</body>
</html>
