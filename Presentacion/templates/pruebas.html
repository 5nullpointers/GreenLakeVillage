<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Minimal Routes API Example</title>
    <style>
      /* El mapa ocupará la pantalla completa */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      // 1) Función para decodificar la polilínea devuelta por la Routes API
      function decodePolyline(encoded) {
        let points = [];
        let index = 0, len = encoded.length;
        let lat = 0, lng = 0;

        while (index < len) {
          let b, shift = 0, result = 0;
          do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
          } while (b >= 0x20);
          const dlat = (result & 1) ? ~(result >> 1) : (result >> 1);
          lat += dlat;

          shift = 0;
          result = 0;
          do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
          } while (b >= 0x20);
          const dlng = (result & 1) ? ~(result >> 1) : (result >> 1);
          lng += dlng;

          points.push({ lat: lat / 1e5, lng: lng / 1e5 });
        }
        return points;
      }

      // 2) Llama a la Routes API y dibuja la ruta en el mapa
      async function fetchAndDrawRoute() {
        const url = 'https://routes.googleapis.com/directions/v2:computeRoutes';
        const apiKey = 'YOUR_API_KEY'; // <-- Sustituye con tu clave

        // Petición mínima: sin tráfico, sin campos avanzados
        const requestBody = {
          origin: {
            location: {
              latLng: { latitude: 37.419734, longitude: -122.0827784 }
            }
          },
          destination: {
            location: {
              latLng: { latitude: 37.417670, longitude: -122.079595 }
            }
          },
          travelMode: 'DRIVE',  
          // No ponemos routingPreference ni nada adicional
        };

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              // Pedir todos los campos, o al menos el polyline:
              'X-Goog-FieldMask': 'routes.polyline.encodedPolyline'
            },
            body: JSON.stringify(requestBody)
          });

          if (!response.ok) {
            // Si falla, verifica la pestaña Network -> Response en DevTools para más detalle.
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          console.log('Routes API response:', data);

          if (data.routes && data.routes.length > 0) {
            const encodedPolyline = data.routes[0].polyline.encodedPolyline;
            const decodedPath = decodePolyline(encodedPolyline);

            // Dibuja la ruta en el mapa
            new google.maps.Polyline({
              path: decodedPath,
              strokeColor: '#FF0000',
              strokeWeight: 4,
              map: window.map
            });

            // Ajusta el zoom para mostrar toda la ruta
            const bounds = new google.maps.LatLngBounds();
            decodedPath.forEach(coord => bounds.extend(coord));
            window.map.fitBounds(bounds);
          } else {
            console.warn('No hay rutas devueltas en la respuesta.');
          }

        } catch (error) {
          console.error('Error al llamar a la Routes API:', error);
        }
      }

      // 3) Inicializa el mapa con marcadores de origen/destino y llama a fetchAndDrawRoute
      function initMap() {
        const origin = { lat: 37.419734, lng: -122.0827784 };
        const destination = { lat: 37.41767, lng: -122.079595 };

        // Crea el mapa
        window.map = new google.maps.Map(document.getElementById('map'), {
          center: origin,
          zoom: 14
        });

        // Marcador de origen
        new google.maps.Marker({
          position: origin,
          map: window.map,
          label: 'O'
        });

        // Marcador de destino
        new google.maps.Marker({
          position: destination,
          map: window.map,
          label: 'D'
        });

        // Llamada para obtener la ruta y dibujarla
        fetchAndDrawRoute();
      }
    </script>

    <!-- 4) Carga la librería de Google Maps para mostrar el mapa -->
    <script
    src="https://maps.googleapis.com/maps/api/js?key=TU_KEY&callback=initMap&libraries=geometry"
    async
    defer>
  </script>  
  </body>
</html>
