<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto - GreenLake Village</title>
    <link rel="stylesheet" href="../static/css/contacto.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo">GreenLake Village</div>
        <ul class="nav-links">
            <li><a href="/">Inicio</a></li>
            <li><a href="/login" class="btn-login">Iniciar Sesión</a></li>
        </ul>
    </nav>    

    <!-- Sección de Contacto -->
    <section class="contact-container">
        <h2>Contacto</h2>
        <p>¿Tienes dudas o necesitas un plan personalizado? Contáctanos y te responderemos lo antes posible.</p>

        <form id="contactForm">
            <div class="input-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="Tu email" required>
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Tu teléfono (opcional)">
            </div>

            <div class="input-group">
                <label for="motivo">Motivo del Contacto</label>
                <select id="motivo" name="motivo" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="informacion">Solicitar Información</option>
                    <option value="soporte">Soporte Técnico</option>
                    <option value="reserva">Reservaciones</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="input-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar</button>
        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2025 GreenLake Village | <a href="#">Política de Privacidad</a> | <a href="#">Términos de Uso</a></p>
    </footer>

    <script src="../static/js/contacto.js"></script>

</body>
</html>
