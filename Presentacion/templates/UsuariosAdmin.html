<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Administración de Usuarios</title>
  <link rel="stylesheet" href="/static/css/UsuariosAdmin.css">
  <!-- Nuevo: incluir SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Nuevo: Incluir Animate.css para animaciones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>

<body>
  <!-- Barra de navegación superior -->
  <nav class="superiorAdmin">
    <div class="logo">Mi Admin - Green Lake Village</div>
    <div class="user-profile">
      <img src="/static/images/user-circle.png" alt="Imagen de perfil" class="profile-img" />
      <span class="user-name">{{ session.user_name or 'Nombre de Usuario' }}</span>
      <div class="user-dropdown" id="userDropdown">
        <ul>
          <li><a href="#">Configuración</a></li>
          <li><a href="/">Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Nuevo layout con panel de menú y panel blanco -->
  <div class="layout">
    <div class="panelBlancoMenu">
      <div class="menuPanel">
        <ul>
          <li>
            <img src="/static/images/inicio.png" alt="Inicio" class="option-icon" />
            <a href="/admin">Inicio</a>
          </li>
          <li class="active">
            <img src="/static/images/profileBlanco.png" alt="Usuarios" class="option-icon" />
            <a href="/admin/UsuariosAdmin">Usuarios</a>
          </li>
          <li>
            <img src="/static/images/Foro.png" alt="Foro" class="option-icon" />
            <a href="/admin/ForoAdmin">Foro</a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Tabla -->
    <div class="panelBlanco">
      <div class="containerPrincipal">
        <h1>Usuarios</h1>
        <table id="userTable" border="1" cellspacing="0" cellpadding="5">
          <thead>
            <tr>
              <!-- Eliminada la columna ID -->
              <th onclick="sortColumn(0)">Nombre</th>
              <th onclick="sortColumn(1)">Email</th>
              <th onclick="sortColumn(2)">Estado</th>
              <th onclick="sortColumn(3)">Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Los usuarios se cargarán aquí dinámicamente -->
          </tbody>
        </table>
        <!-- Agrupamos el div de info y el de paginación en una misma fila -->
        <div class="info-pagination-row">
          <div id="recordInfo" class="record-info"></div>
          <div class="paginas" id="paginationControls"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/UsuariosAdmin.js"></script>
</body>

</html>
