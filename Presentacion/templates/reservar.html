<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reservar Hotel</title>
    <!-- Carga tu CSS principal -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Nuevo CSS específico para reservar.html -->
    <link rel="stylesheet" href="/static/css/reservar.css">
</head>

<body>

    <!-- ENCABEZADO (Navbar) -->
    <nav class="navbar">
        <div class="nav-logo">
            Green Lake
        </div>
        <ul class="nav-links">
            <li><a href="/map">Hoteles</a></li>
            <li><a href="#">Rutas</a></li>
            <li><a href="#">Sitios</a></li>
            <li><a href="#">Foro</a></li>
            <!-- Enlace para Iniciar Sesión -->
            <li><a href="/login">Iniciar Sesión</a></li>
        </ul>
    </nav>
    <!-- FIN ENCABEZADO -->

    <!-- CONTENEDOR PRINCIPAL: Formulario centrado -->
    <div class="main-container">
        <div class="left-col">
            <h2>
                Reservar: {{ hotel.nombre }}
            </h2>

            <!-- Bloque para mostrar error si existe -->
            {% if error_message %}
            <div class="error-message">
                {{ error_message|safe }}
            </div>
            {% endif %}

            <!-- Formulario de reserva -->
            <form action="/reservas" method="POST">
                <input type="hidden" name="hotel_id" value="{{ hotel._id }}">

                <label for="startDate">Fecha de inicio:</label>
                <input type="date" id="startDate" name="startDate" required>

                <label for="endDate">Fecha de fin:</label>
                <input type="date" id="endDate" name="endDate" required>

                <label for="numPersons">Número de personas (opcional):</label>
                <input type="number" id="numPersons" name="numPersons" min="1">

                <button type="submit" class="btn reserve">
                    Confirmar Reserva
                </button>
            </form>
        </div>
    </div>
    <!-- FIN CONTENEDOR PRINCIPAL -->

    <!-- PIE DE PÁGINA (Footer) -->
    <footer class="footer">
        <p>© 2025 GreenLake Village |
            <a href="#">Política de Privacidad</a> |
            <a href="#">Términos de Uso</a>
        </p>
    </footer>
    <!-- FIN PIE DE PÁGINA -->
</body>

</html>
